name: That American Archive - Generate Oldies Feed

permissions:
  contents: write

on:
  schedule:
    # Every Wednesday at 6:00 AM UTC
    - cron: '0 6 * * 3'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate oldies feed
        run: |
          python script/generateFeed_oldies.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add feed/oldies.xml data/used_oldies.json
          git diff --staged --quiet || git commit -m "Update oldies feed - $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

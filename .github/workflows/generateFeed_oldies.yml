name: Oldies RSS Generator

permissions:
  contents: write

on:
  schedule:
    - cron: '0 14 * * 3'  # Wednesday 6am PST (14:00 UTC)
  workflow_dispatch:

jobs:
  oldies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil

      - name: Generate Oldies Feed
        run: python script/generateFeed_oldies.py

      - name: Commit Oldies Feed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed/oldies.xml used_oldies.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Oldies feed"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

name: Oldies RSS Generator

permissions:
  contents: write

on:
  schedule:
    - cron: '0 14 * * 3'  
  workflow_dispatch:

jobs:
  oldies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser python-dateutil

      - name: Generate Oldies Feed
        run: python script/generateFeed_oldies.py

      # 🔍 Debug (optional but very helpful)
      - name: Show diff
        run: |
          echo "Checking changes..."
          git status
          git diff -- feed/oldies.xml || true

      - name: Commit RSS feed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add feed/oldies.xml

          # IMPORTANT: check actual file diff, not staged-only diff
          if git diff --quiet HEAD -- feed/oldies.xml; then
            echo "No real changes detected — skipping commit"
            exit 0
          fi

          git commit -m "Update Oldies RSS feed"
          

name: That American Archive - Main Scrape

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Workflow mode'
        required: true
        default: all
        type: choice
        options:
          - all
          - scrape
          - generate feed
          - generate markdown

  schedule:
    # Sunday 12:00 AM – 4:59 PM PDT
    - cron: '*/30 7-23 * * 0'

    # Sunday 5:00 PM – 11:30 PM PDT
    - cron: '*/30 0-6 * * 1'

jobs:
  run_workflow:
    runs-on: ubuntu-latest

    env:
      MODE: ${{ github.event.inputs.mode || 'all' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dateutil beautifulsoup4 lxml feedparser

      # ----------------
      # SCRAPER
      # ----------------
      - name: Run Scraper
        if: env.MODE == 'all' || env.MODE == 'scrape'
        env:
          SCRAPE_MODE: ${{ env.MODE }}
        run: python script/scrape.py

      - name: Commit scraped data
        if: env.MODE == 'all' || env.MODE == 'scrape'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/data.json

          if git diff --cached --quiet; then
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
            echo "No data changes to commit"
            exit 0
          fi

          echo "DATA_CHANGED=true" >> $GITHUB_ENV

          git commit -m "Update TAL episodes data"
          git push

      # ----------------
      # RSS FEED
      # ----------------
      - name: Generate RSS feed
        if: env.MODE == 'all' || env.MODE == 'generate feed'
        run: python script/generateFeed.py

      - name: Commit RSS feed
        if: env.MODE == 'all' || env.MODE == 'generate feed'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add feed/

          if git diff --cached --quiet; then
            echo "No RSS changes to commit"
            exit 0
          fi

          git commit -m "Update TAL RSS feed"
          git push

      # ----------------
      # MARKDOWN TABLE
      # ----------------
      - name: Generate Markdown
        if: env.MODE == 'all' || env.MODE == 'generate markdown'
        run: python script/markdown.py

      - name: Commit Markdown
        if: env.MODE == 'all' || env.MODE == 'generate markdown'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/episodes.md

          if git diff --cached --quiet; then
            echo "No markdown changes to commit"
            exit 0
          fi

          git commit -m "Update TAL markdown table"
          git push

      # ----------------
      # LOG CHECK
      # ----------------
      - name: Log scraper check
        if: env.MODE == 'all' || env.MODE == 'scrape'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M")

          if [ "$DATA_CHANGED" = "true" ]; then
            echo "$TIMESTAMP - Episode Posted" >> data/check.log
          else
            echo "$TIMESTAMP - Nothing New" >> data/check.log
          fi

          git add data/check.log

          if git diff --cached --quiet; then
            echo "No log changes"
            exit 0
          fi

          git commit -m "Update check.log"
          git push

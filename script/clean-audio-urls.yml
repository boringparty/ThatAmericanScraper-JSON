#!/usr/bin/env python3

import json
import shutil
import re
from datetime import datetime


INPUT = "data/data.json"
BACKUP = f"data/data_backup_{datetime.now().strftime('%Y%m%d_%H%M%S')}.json"


def clean_audio_url(url):
    if not url:
        return url

    url = str(url).strip()

    # Remove tracking parameters
    url = url.split("?")[0]

    # Unwrap redirect URLs
    if "/s/" in url:
        url = url.split("/s/", 1)[1]

    # Ensure https
    if not url.startswith("http"):
        url = "https://" + url

    return url


def main():

    print(f"Creating backup: {BACKUP}")
    shutil.copy2(INPUT, BACKUP)

    with open(INPUT, "r", encoding="utf-8") as f:
        data = json.load(f)

    changed = 0

    for episode in data:

        for field in ["download", "download_clean"]:

            if field not in episode or not episode[field]:
                continue

            old = episode[field]
            new = clean_audio_url(old)

            if old != new:
                episode[field] = new
                changed += 1

                print("\nChanged:")
                print("OLD:", old)
                print("NEW:", new)

    with open(INPUT, "w", encoding="utf-8") as f:
        json.dump(data, f, indent=2, ensure_ascii=False)

    print()
    print(f"Updated {changed} URLs")
    print(f"Backup saved as {BACKUP}")


if __name__ == "__main__":
    main()
